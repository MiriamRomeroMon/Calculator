<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="javascript.js" defer></script>
        <link rel="stylesheet" href="style.css">
        <title>Calculator</title>
    </head>
    <body>
        <div class="container">
            <div class="screen"></div>
            <div class="buttons">
                <button class="delete">C</button>
                <button class="divide operator">/</button>
                <button class="multiply operator">x</button>
                <button class="subtract operator">-</button>
                

                <button class="seven">7</button>
                <button class="eight">8</button>
                <button class="nine">9</button>
                <button class="add operator">+</button>

                <button class="four">4</button>
                <button class="five">5</button>
                <button class="six">6</button>
                

                <button class="one">1</button>
                <button class="two">2</button>
                <button class="three">3</button>
                <button class="dot">.</button>

                <button class="zero">0</button>   <!-- span 2 -->
                <button class="equal">=</button>  <!-- span 2 -->
            </div>
        </div>
    </body>
</html>
